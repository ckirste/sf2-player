name: Deploy Ensemble to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # manueller Start über GitHub UI möglich

permissions:
  contents: read
  pages: write
  id-token: write

# Nur einen Deploy gleichzeitig, laufenden nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Muss mit dem GitHub-Repo-Namen übereinstimmen
          GITHUB_PAGES_BASE: /Ensemble/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
